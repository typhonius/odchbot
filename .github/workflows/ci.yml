name: CI

on:
  push:
    branches: [v3]
  pull_request:
    branches: [v3]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl-version: ['5.34', '5.38', '5.40']

    name: Perl ${{ matrix.perl-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Install CPAN dependencies
        run: cpanm --installdeps --notest --with-feature=commands .

      - name: Syntax check (load all modules)
        run: perl ./odchbot.test

      - name: Copy example configs
        run: |
          cp odchbot.yml.example odchbot.yml
          cp opchat.yml.example opchat.yml

      - name: Boot test
        run: perl ./odchbot.pl && perl ./opchat.pl

      - name: Run test suite
        run: prove -lv t/
